<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="راهنمای تخصصی عامل‌های نرم‌افزاری - Token Saver">
  <meta property="og:description" content="بررسی کامل معماری، حافظه و استراتژی‌های عامل‌های هوش مصنوعی. از ReAct تا گراف کدبیس.">
  <meta property="og:url" content="https://tokensaver.ir/blog-post.html">
  <meta property="og:image" content="https://tokensaver.ir/og-image.png">
  <meta property="og:site_name" content="Token Saver">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="راهنمای تخصصی عامل‌های نرم‌افزاری - Token Saver">
  <meta name="twitter:description" content="معماری ReAct، حافظه بلندمدت، گراف کدبیس و بهترین ابزارها برای Agent-Driven Development.">

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .blog-wrapper {
      padding: 6rem 2rem 4rem 2rem;
      min-height: 100vh;
      background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
    }
    .blog-container { 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 3rem; 
      background: rgba(15, 15, 20, 0.6); 
      backdrop-filter: blur(20px);
      border-radius: 16px; 
      border: 1px solid rgba(255, 255, 255, 0.08); 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .blog-container h1 { color: #fff; font-size: 2.2rem; margin-bottom: 1.5rem; text-align: right; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .blog-container h2 { color: #e2e8f0; font-size: 1.6rem; margin-top: 2.5rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
    .blog-container h3 { color: #cbd5e1; font-size: 1.2rem; margin-top: 1.5rem; }
    .blog-container p { line-height: 1.9; color: #94a3b8; font-size: 1.05rem; margin-bottom: 1.2rem; }
    .blog-container ul, .blog-container ol { color: #94a3b8; line-height: 1.8; margin-bottom: 1.5rem; padding-right: 1.5rem; }
    .blog-container li { margin-bottom: 0.5rem; }
    .blog-container pre { 
      background: #050508; 
      padding: 1.5rem; 
      border-radius: 12px; 
      overflow-x: auto; 
      border: 1px solid rgba(255,255,255,0.05);
      margin: 1.5rem 0;
    }
    .blog-container code { font-family: 'Courier New', Courier, monospace; color: #a78bfa; font-size: 0.9em; background: rgba(167, 139, 250, 0.1); padding: 0.1rem 0.3rem; border-radius: 4px; }
    .blog-container pre code { color: #e2e8f0; background: transparent; padding: 0; }
    .blog-container table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 2rem 0; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .blog-container th, .blog-container td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: right; color: #cbd5e1; }
    .blog-container th { background: rgba(255, 255, 255, 0.03); color: #fff; font-weight: bold; }
    .blog-container tr:last-child td { border-bottom: none; }
    .blog-container blockquote { border-right: 4px solid #3b82f6; margin: 1.5rem 0; padding: 0.5rem 1.5rem 0.5rem 0; background: rgba(59, 130, 246, 0.05); border-radius: 0 8px 8px 0; }

    /* Reading Progress Bar */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(to right, #3b82f6, #a78bfa, #10b981);
      z-index: 9999;
      transition: width 0.1s linear;
    }

    /* Back Button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #94a3b8;
      font-size: 0.9rem;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      margin-bottom: 2rem;
      transition: all 0.2s ease;
    }
    .back-btn:hover { color: #60a5fa; border-color: rgba(96,165,250,0.3); }

    /* Scroll to Top Button */
    .scroll-top {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 100;
    }
    .scroll-top.visible { opacity: 1; }
    .scroll-top:hover { background: rgba(59,130,246,0.3); }

    /* Estimated reading time badge */
    .reading-meta {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
    }
    .reading-badge {
      background: rgba(96,165,250,0.1);
      color: #60a5fa;
      border: 1px solid rgba(96,165,250,0.2);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Reading Progress Bar -->
  <div class="reading-progress" id="reading-progress"></div>

  <!-- Navbar -->
  <nav class="navbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(5, 5, 8, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);">
    <div class="logo">
      <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;">
        <span style="width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-weight:900;font-family:monospace;background:linear-gradient(120deg,#3b82f6,#8b5cf6 55%,#10b981);color:#fff;">T</span>
        <span style="background:linear-gradient(120deg,#3b82f6,#8b5cf6 55%,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">Token Saver</span>
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="fa.html">فارسی</a>
      <a href="blog.html" style="color: #60a5fa; font-weight: bold;">Blog</a>
    </div>
  </nav>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 15L12 9L6 15" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <div class="blog-wrapper">
    <div class="blog-container" id="content">
      <!-- Back Button -->
      <a href="blog.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to Blog
      </a>

      <!-- Reading Meta -->
      <div class="reading-meta">
        <span class="reading-badge">📖 Research Report</span>
        <span class="reading-badge">🕐 ~15 Min Read</span>
        <span class="reading-badge">🤖 AI Agents</span>
        <span class="reading-badge">🛡️ Token Saving</span>
      </div>

      <div id="article-body">
        <div style="text-align: center; color: #64748b; padding: 3rem;">در حال بارگذاری محتوای مقاله...</div>
      </div>
    </div>
  </div>

  <script>
    // Fetch and render markdown
    fetch('agent-research-report.md')
      .then(response => {
        if (!response.ok) throw new Error('Could not load markdown file.');
        return response.text();
      })
      .then(text => {
        document.getElementById('article-body').innerHTML = marked.parse(text);
      })
      .catch(err => {
        document.getElementById('article-body').innerHTML = '<h2 style="color:#ef4444;text-align:center;">خطا در بارگذاری مقاله</h2><p style="text-align:center;">' + err.message + '</p>';
      });

    // Reading Progress Bar
    const progressBar = document.getElementById('reading-progress');
    const scrollTopBtn = document.getElementById('scroll-top-btn');
    window.addEventListener('scroll', () => {
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const scrolled = (window.scrollY / docHeight) * 100;
      progressBar.style.width = scrolled + '%';
      if (window.scrollY > 400) {
        scrollTopBtn.classList.add('visible');
      } else {
        scrollTopBtn.classList.remove('visible');
      }
    });
  </script>
</body>
</html>

name: Build & Release Desktop App

# با push کردن یک tag مثل v1.1.0 اجرا می‌شود و نصبی‌های ویندوز و مک را
# می‌سازد و به‌صورت خودکار در GitHub Releases آپلود می‌کند.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: npm run dist:mac
          - os: windows-latest
            build: npm run dist:win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.build }}
        env:
          # ساخت بدون code signing (نصبی‌های unsigned)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.dmg
            desktop/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
